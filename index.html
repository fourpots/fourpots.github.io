<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourpots - Coming Soon</title>
    <meta name="description" content="Fourpots - Building the future of AI-powered health tracking. Coming soon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #fafafa;
            overflow: hidden;
            position: relative;
        }

        /* Subtle animated gradient background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.04) 0%, transparent 50%);
            animation: drift 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2%, -1%) rotate(1deg); }
            50% { transform: translate(-1%, 2%) rotate(-0.5deg); }
            75% { transform: translate(1%, -2%) rotate(0.5deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 1.1rem;
            font-weight: 300;
            color: #737373;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            border: 1px solid #262626;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #a3a3a3;
            background: rgba(23, 23, 23, 0.6);
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .product-hint {
            font-size: 0.95rem;
            color: #525252;
            line-height: 1.7;
            margin-top: 1rem;
        }

        .contact {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #404040;
        }

        .contact a {
            color: #737373;
            text-decoration: none;
            border-bottom: 1px solid #333;
            transition: color 0.2s, border-color 0.2s;
        }

        .contact a:hover {
            color: #fafafa;
            border-color: #fafafa;
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 2.2rem;
            }
            .tagline {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status">
            <span class="status-dot"></span>
            Coming Soon
        </div>
        <h1 class="logo">fourpots</h1>
        <p class="tagline">Something new is brewing.</p>
        <p class="product-hint">Our first product: a voice-operated AI health tracking device and app. Stay tuned.</p>
        <div class="contact">
            <p>Get in touch: <a href="mailto:hello@fourpots.com">hello@fourpots.com</a></p>
        </div>
    </div>
</body>
</html>
