<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fourpots</title>
    <meta name="description" content="fourpots - coming soon.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #111;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            width: 100%;
            max-width: 540px;
            padding: 2rem 1.5rem;
        }

        .name {
            font-size: 1.125rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 2.5rem;
        }

        .status {
            font-size: 0.8125rem;
            font-weight: 500;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 1.25rem;
        }

        .brief {
            font-size: 0.9375rem;
            line-height: 1.65;
            color: #444;
            margin-bottom: 2.5rem;
        }

        .brief strong {
            color: #111;
            font-weight: 500;
        }

        .divider {
            width: 24px;
            height: 1px;
            background: #ccc;
            margin-bottom: 2.5rem;
        }

        .contact {
            font-size: 0.8125rem;
            color: #888;
        }

        .contact a {
            color: #111;
            text-decoration: none;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            body { align-items: flex-start; }
            .page { padding: 3rem 1.25rem 2rem; }
            .name { font-size: 1rem; margin-bottom: 2rem; }
            .brief { font-size: 0.875rem; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="name">fourpots</div>
        <div class="status">Coming soon</div>
        <div class="brief">
            We're building tools at the intersection of hardware and AI, starting with a <strong>voice-operated health tracking device</strong> and companion app. More to follow.
        </div>
        <div class="divider"></div>
        <div class="contact">
            <a href="mailto:hello@fourpots.com">hello@fourpots.com</a>
        </div>
    </div>
</body>
</html>
